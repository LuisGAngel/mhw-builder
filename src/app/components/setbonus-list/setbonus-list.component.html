<div class="container">
	<div class="search-container">
		<input #searchBox (keyup)="search(searchBox.value)" placeholder="Search names" />
		<button type="button" class="clear-button" (click)="resetSearchResults()">
			<i class="fas fa-times"></i>
		</button>
	</div>

	<cdk-virtual-scroll-viewport itemSize="50" class="scroll-container" *ngIf="setbonuses">
		<div *cdkVirtualFor="let setbonus of filteredSetbonuses" class="scroll-item-container" (click)="selectSetbonus(setbonus)">
			<div class="name-container">
				<div class="name">
					{{setbonus.name}}
				</div>
				<div class="level" *ngIf="setbonus.level">
					<span *ngFor="let key of setbonus.level | numbersArr">
						<i class="fas fa-star fa-sm star-icon"></i>
					</span>
				</div>
			</div>

			<div class="skills-container" *ngIf="setbonus?.setLevels.length == 1">
				<div class="skill-container" *ngFor="let bonus of getSkills(setbonus)">
					<div class="count">
						{{bonus.requiredCount}}
					</div>
					<div class="name">
						{{bonus.skill.name}}
					</div>
				</div>
			</div>
			<div class="skills-container-2" *ngIf="setbonus?.setLevels.length > 1">
				<div class="skill-container" *ngFor="let bonus of getSkills(setbonus)">
					<div class="count">
						{{bonus.requiredCount}}
					</div>
					<div class="name">
						{{bonus.skill.name}}
					</div>
				</div>
			</div>
		</div>
	</cdk-virtual-scroll-viewport>
</div>
